<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agentyx Social Banner Template</title>
    <!-- Link to central design system -->
    <link rel="stylesheet" href="../../brand-system/colors_and_type.css" />
    <style>
      :root {
        --banner-width: 1200px;
        --banner-height: 630px;
        background: #000;
        overflow: hidden;
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
        background: #000;
      }

      .banner-viewport {
        position: relative;
        width: var(--banner-width);
        height: var(--banner-height);
        background: var(--ax-bg);
        overflow: hidden;
        transform-origin: center center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        box-sizing: border-box;
        padding: var(--ax-space-12) var(--ax-space-16);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      /* Background radial glow */
      .radial-glow {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 50% 45%, rgba(37,99,235,0.18), transparent 52%),
                    linear-gradient(to bottom, rgba(7,11,19,0.05), #070b13 96%);
        pointer-events: none;
        z-index: 0;
      }

      /* Background Grid */
      .bg-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
        background-size: 60px 60px;
        z-index: 1;
      }

      /* Cyan decorative curves (similar to marketing hero) */
      .cyan-curves {
        position: absolute;
        inset: -10%;
        opacity: 0.8;
        pointer-events: none;
        z-index: 2;
      }

      .content {
        position: relative;
        z-index: 10;
        margin-top: var(--ax-space-8);
      }

      .header {
        position: relative;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo-group {
        display: flex;
        align-items: center;
        gap: var(--ax-space-3);
      }

      .logo-group img {
        width: 32px;
        height: 32px;
        object-fit: contain;
      }

      .logo-group span {
        font-family: var(--ax-font-heading);
        font-size: var(--ax-fs-h5);
        font-weight: 700;
        color: var(--ax-fg);
        letter-spacing: var(--ax-tracking-wide);
      }

      .tagline {
        font-family: var(--ax-font-mono);
        font-size: var(--ax-fs-meta);
        color: var(--ax-fg-subtle);
        letter-spacing: 0.1em;
      }

      .footer {
        position: relative;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-top: 1px solid var(--ax-divider);
        padding-top: var(--ax-space-4);
      }

      .footer-tag {
        font-family: var(--ax-font-mono);
        font-size: var(--ax-fs-meta);
        color: var(--ax-cyan-soft);
        text-transform: uppercase;
        letter-spacing: var(--ax-tracking-eyebrow);
      }

      .footer-meta {
        font-family: var(--ax-font-body);
        font-size: var(--ax-fs-meta);
        color: var(--ax-fg-subtle);
      }

      /* Badge style */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: var(--ax-space-2);
        background: var(--ax-brand-tint);
        border: 1px solid rgba(96,165,250,0.30);
        color: var(--ax-brand-200);
        font-family: var(--ax-font-mono);
        font-size: var(--ax-fs-eyebrow);
        text-transform: uppercase;
        padding: 6px 12px;
        border-radius: var(--ax-radius-pill);
        margin-bottom: var(--ax-space-4);
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ax-cyan);
        box-shadow: 0 0 6px var(--ax-cyan);
      }
    </style>
  </head>
  <body>
    
    <div class="banner-viewport" id="viewport">
      <div class="radial-glow"></div>
      <div class="bg-grid"></div>

      <!-- Cyan stroke field -->
      <div class="cyan-curves">
        <svg viewBox="0 0 696 316" fill="none" preserveAspectRatio="xMidYMid slice" style="width: 100%; height: 100%; color: #67e8f9">
          <g stroke="currentColor" fill="none">
            <!-- Render a few subset curves -->
            <path d="M-300 -100C-300 -100 -200 200 150 300C500 400 600 800 600 800" stroke-width="0.8" stroke-opacity="0.12" stroke-dasharray="2 6" />
            <path d="M-250 -120C-250 -120 -150 180 200 280C550 380 650 780 650 780" stroke-width="1.0" stroke-opacity="0.18" stroke-dasharray="2 6" />
            <path d="M-200 -140C-200 -140 -100 160 250 260C600 360 700 760 700 760" stroke-width="1.2" stroke-opacity="0.22" stroke-dasharray="2 6" />
          </g>
        </svg>
      </div>

      <!-- HEADER -->
      <div class="header">
        <div class="logo-group">
          <img src="../../brand-system/assets/agentyx-logo.png" alt="Logo" />
          <span>Agentyx</span>
        </div>
        <div class="tagline">by Lev Innovation</div>
      </div>

      <!-- CONTENT -->
      <div class="content">
        <div class="badge">
          <span class="badge-dot"></span>
          AI Employees Online
        </div>
        <h1 class="ax-h1" style="font-size: 52px; font-weight: 700; line-height: 1.1; margin: 0 0 var(--ax-space-3); color: var(--ax-fg)">
          Atención, Validación y Entrega<br />
          de Resultados <span style="color: var(--ax-brand-soft)">las 24 horas</span>
        </h1>
        <p class="ax-body-lg" style="color: var(--ax-fg-muted); margin: 0; max-width: 800px">
          Despliega empleados de IA corporativos que operan de forma coordinada dentro de tus ERPs, CRMs, WhatsApp y correo.
        </p>
      </div>

      <!-- FOOTER -->
      <div class="footer">
        <div class="footer-tag">AUTOMATIZACIÓN EN LATAM</div>
        <div class="footer-meta">agentyx.app · 2026</div>
      </div>
    </div>

    <script>
      // Responsive scale script to fit display viewport
      const viewport = document.getElementById("viewport");
      function resizeViewport() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const scale = Math.min(w / 1200, h / 630);
        viewport.style.transform = `scale(${scale})`;
      }
      window.addEventListener("resize", resizeViewport);
      resizeViewport();
    </script>
  </body>
</html>
